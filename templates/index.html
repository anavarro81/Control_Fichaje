<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Fichaje </title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>

<body>



  <!-- Formulario seleccionar fecha para ver imputaciones -->
  <div class="cabecera">
    <form action="/semana">
      <label for="dia"> Ver semana: </label>
      <!-- <input type="date" id="dia" name="dia" > -->
      <input type="week" name="week" id="week" value="{{ fecha }}">
      <!-- <input type="hidden" id="fecha_query" name="fecha_query" value="{{ fecha_query }}"> -->
      <button type="submit"> OK </button>
    </form>
  </div>
  <!-- Fomrulario seleccinar fecha para ver imputaciones -->
  <div class="tabla_horario">
    <form action="" id="form_horario" method="post">
      <table>
        <tr>
          <th> Fecha </th>
          <th>Hora Entrada</th>
          <th>Hora Salida</th>
          <th>Horas dia</th>
          <th>Motivo</th>
          <th>Acciones</th>
        </tr>
        {% for day in range(0, semana|length) %}
        <tr>
          <td id="fecha_lunes" align="right"> {{semana[day]}} </td>

          <!-- Hora de entrada -->
          <td> <input class="hora" type="time" name="hr_entrada" id="hora_ent" value="00:00"> </td>

          <!-- Hora de salida -->
          <td> <input class="hora" type="time" name="hr_salida" id="hora_sal" value="00:00"> </td>

          <!-- Total horas dia -->
          <td>
            {% if tiempo_formateado %}
            {{ tiempo_formateado }}
            {% endif %}
          </td>

          <!-- Motivo incumplimiento horario -->
          <td> <input type="text" name="hentrada"> </td>

          <td> <button type="button"> Editar </button>
          </td>
        </tr>
        {% endfor %}
      </table>
      <button type="submit" form="form_horario" onclick="return validarHora()" value="Submit"> Fichar </button>
    </form>

    <script src="{{ url_for('static', filename='validaciones.js') }}"> </script>
    <script src="{{ url_for('static', filename='eventos.js') }}"> </script>

</body>

</html>
